name: Xcode - Build and Analyze

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    name: Build and Analyze
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Restore libDuckDB.a from Cache
        id: cache-duckdb
        uses: actions/cache@v4
        with:
          path: Vendor/lib/libDuckDB.a
          key: ${{ runner.os }}-duckdb-lib-v1

      - name: Build libDuckDB.a (if not cached)
        if: steps.cache-duckdb.outputs.cache-hit != 'true'
        run: |
          echo "Building libDuckDB.a using Swift Package Manager..."
          mkdir -p Vendor/lib

          # 进入 duckdb-swift 目录
          cd Vendor/duckdb-swift

          # 使用 Swift PM 编译 Release 版本
          # 这会编译 C++ 源码生成目标文件 (.o)
          swift build -c release -Xswiftc -static-stdlib

          # 找到所有编译生成的 Cduckdb 目标文件 (.o)
          # 注意：路径可能包含架构名 (x86_64 或 arm64)，使用通配符匹配
          # 排除 Swift 模块的 .o 文件，只保留 C++ 对象
          echo "Archiving object files..."
          find .build -name "*.o" | grep "Cduckdb.build" | xargs ar rcs ../../Vendor/lib/libDuckDB.a

          echo "Build complete. libDuckDB.a size:"
          ls -lh ../../Vendor/lib/libDuckDB.a

      - name: Build and Analyze
        run: |
          if ! command -v xcpretty &> /dev/null; then
             gem install xcpretty
          fi

          # 显式指定 scheme 和 project，避免自动探测错误
          xcodebuild clean build analyze \
            -project ClipFlow.xcodeproj \
            -scheme ClipFlow \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}
