name: Xcode - Build and Analyze

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    name: Build and Analyze
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Restore libDuckDB.a from Cache
        id: cache-duckdb
        uses: actions/cache@v4
        with:
          path: Vendor/lib/libDuckDB.a
          key: ${{ runner.os }}-duckdb-lib-v1

      - name: Build libDuckDB.a from Source (if not cached)
        if: steps.cache-duckdb.outputs.cache-hit != 'true'
        run: |
          echo "Building libDuckDB.a from source..."
          mkdir -p Vendor/lib

          # 确保 cmake 和 ninja 已安装
          brew install cmake ninja

          # 进入 duckdb 源码目录（位于 submodule 中）
          cd Vendor/duckdb-swift/duckdb

          # 创建构建目录
          mkdir -p build
          cd build

          # 配置 CMake 构建静态库
          # -DDUCKDB_EXTENSION_PARQUET=1: 启用 Parquet 支持（可选，根据需要）
          # -DDUCKDB_EXTENSION_ICU=1: 启用 ICU 支持（可选，根据需要）
          # -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64": 构建通用二进制（Universal Binary）
          cmake -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_UNITTESTS=OFF \
            -DENABLE_SANITIZER=OFF \
            -DENABLE_UBSAN=OFF \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            ..
            
          # 开始编译
          ninja

          # 复制编译产物到项目目录
          # 编译后的静态库通常位于 src/libduckdb_static.a
          cp src/libduckdb_static.a ../../../lib/libDuckDB.a

          echo "Build complete. libDuckDB.a size:"
          ls -lh ../../../lib/libDuckDB.a

      - name: Build and Analyze
        run: |
          if ! command -v xcpretty &> /dev/null; then
             gem install xcpretty
          fi

          # 显式指定 scheme 和 project，避免自动探测错误
          xcodebuild clean build analyze \
            -project ClipFlow.xcodeproj \
            -scheme ClipFlow \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}
